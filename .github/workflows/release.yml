name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Validate tag matches source version
        shell: pwsh
        run: |
          $sourceVersion = python -c "import sys; sys.path.insert(0, 'src'); from core.version import APP_VERSION; print(APP_VERSION)"
          if ("v$sourceVersion" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match source version v$sourceVersion"
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build release artifacts
        shell: pwsh
        run: python scripts/build_release.py

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: installer/PIDAudioRecorder-Setup-*.exe
